<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Secret Spy</title>
<style>
body{background:#000;color:#fff;font-family:Arial,Helvetica,sans-serif;margin:0;display:flex;justify-content:center;}
#app{max-width:420px;width:100%;padding:18px;text-align:center;}
h1{margin-top:10px;font-size:34px;}
#mission{font-size:16px;margin:10px 0 20px;}
.card{border:1px solid #fff;border-radius:14px;padding:16px;margin-top:10px;}
button{width:100%;padding:14px;margin:8px 0;border-radius:12px;border:1px solid #fff;background:#000;color:#fff;font-size:15px;}
button:active{background:#fff;color:#000;}
.hidden{display:none;}
.big{font-size:26px;margin-top:30px;}
</style>
</head>
<body>
<div id="app">
<h1>The Secret Spy</h1>
<div id="mission">Mission - You have to find the code which three friends are using in order to spy on their messages.</div>

<div id="game"></div>

<div id="end" class="hidden">
<div id="endText" class="big"></div>
<button onclick="restartGame()">Play Again</button>
</div>
</div>

<script>
const questions=[
{
q:"Instance 1 - Find the code that the three friends have used.",
coded:"WORROMOT TUOEDIH EHT TA EM TEEM",
uncoded:"MEET ME AT THE HIDEOUT TOMORROW",
options:[
"It reverses the letters and words in order to form a sentence.",
"It reverses only some letters while in the others it is normal.",
"It reverses all the letters but not the words."
],
answer:0
},
{
q:"Instance 2 - Find the code that the friends have used",
coded:"THE DROWSSAP IS EEW YLLIW AKNOW. REMEMBER SYUG. THE TUOEDIH IS NO THE DNOCES TREE OT ETH RIGHT.",
uncoded:"THE HIDEOUT IS ON THE SECOND TREE TO THE RIGHT. THE PASSWORD IS WEE WILLY WONKA. REMEMBER GUYS.",
options:[
"It reverses the letters alternatively and reverses the sentences instead of the words.",
"It reverses only some letters while in the others it is normal.",
"It takes the first letter puts it at the last and the rest stays the same."
],
answer:0
},
{
q:"Instance 3 - Find the code that the friends have used.",
coded:"AKEM URES OT EEPK HOSET MALLS IDSK UTO FO URO USINESSB",
uncoded:"MAKE SURE TO KEEP THOSE SMALL KIDS OUT OF OUR BUSINESS.",
options:[
"It reverses only some letters while in the others it is normal.",
"It reverses the letters alternatively and reverses the sentences instead of the words.",
"It takes the first letter puts it at the last and the rest stays the same."
],
answer:2
}
];

let index=0;
const gameDiv=document.getElementById('game');
const endDiv=document.getElementById('end');
const endText=document.getElementById('endText');

function loadQuestion(){
let q=questions[index];
let html=`<div class='card'>
<h3>${q.q}</h3>
<p><b>Coded:</b><br>${q.coded}</p>
<p><b>Uncoded:</b><br>${q.uncoded}</p>`;

q.options.forEach((opt,i)=>{
html+=`<button onclick='choose(${i})'>${opt}</button>`;
});
html+="</div>";

gameDiv.innerHTML=html;
}

function choose(i){
if(i!==questions[index].answer){
endGame(false);
return;
}
index++;
if(index>=questions.length) endGame(true);
else loadQuestion();
}

function endGame(win){
gameDiv.innerHTML="";
endDiv.classList.remove('hidden');
endText.textContent=win?"You Won":"Game Over";
}

function restartGame(){
index=0;
endDiv.classList.add('hidden');
loadQuestion();
}

loadQuestion();
</script>
</body>
</html>
