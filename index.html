<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Name the Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;background:black;color:white;font-family:Arial;text-align:center;}
h1{margin-top:15px;}
#mission{margin:10px 20px;font-size:18px;}
button{background:black;color:white;border:2px solid white;padding:12px;margin:8px;width:85%;font-size:16px;border-radius:12px;}
button:hover{background:white;color:black;}
canvas{background:black;}
</style>
</head>

<body>

<h1>Name the Game</h1>
<div id="mission">You have to name the action that the stick figure is doing.</div>

<canvas id="canvas" width="260" height="270"></canvas>
<div id="options"></div>
<div id="result"></div>

<script>
const ctx = canvas.getContext("2d");
ctx.strokeStyle="white";
ctx.fillStyle="white";
ctx.lineWidth=4;

let frame=0;
let questionIndex=0;

function drawStick(x,y,a1,a2,l1,l2,rot=0){
 ctx.save();
 ctx.translate(x,y);
 ctx.rotate(rot);
 ctx.beginPath(); ctx.arc(0,-40,12,0,Math.PI*2); ctx.stroke();
 ctx.beginPath(); ctx.moveTo(0,-28); ctx.lineTo(0,0); ctx.stroke();
 ctx.beginPath(); ctx.moveTo(0,-20); ctx.lineTo(a1,-5); ctx.stroke();
 ctx.beginPath(); ctx.moveTo(0,-20); ctx.lineTo(a2,-5); ctx.stroke();
 ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(l1,30); ctx.stroke();
 ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(l2,30); ctx.stroke();
 ctx.restore();
}

function drawEmoji(emoji,x,y,size){
 ctx.font=size+"px Arial";
 ctx.fillText(emoji,x,y);
}

function actionMakeBabyLaugh(){
 let t=frame%320;
 if(t<80) drawStick(130,170,0,0,10,-10,t/200);
 else if(t<160) drawStick(130,170,40*Math.sin(t/5),0,10,-10);
 else if(t<240) drawStick(130,170,20*Math.sin(t/3),-20*Math.sin(t/3),15,-15);
 else drawStick(130,200,0,0,20,-20);
}

function actionSignal(){
 let arm=70*Math.sin(frame/4);
 drawStick(130,170,arm,0,10,-10);
 drawEmoji("💡",170,115,30);
}

function actionCaffeineRush(){
 let t=frame%300;
 if(t<100){
   drawStick(130,170,40,0,10,-10);
   drawEmoji("🫖",175,130,28);
 }
 else if(t<200){
   drawStick(130,170,10,0,10,-10);
   drawEmoji("☕",150,120,26);
 }
 else{
   drawStick(130,170,40*Math.sin(t/4),-40*Math.sin(t/4),15,-15);
 }
}

//// FINAL ACTION — ONLY SWIMMING + FLOATING
function actionCoach(){
 let t = frame % 300;

 function label(text){
   ctx.font="22px Arial";
   ctx.fillText(text,80,30);
 }

 if(t < 150){
   label("Swimming");
   let swim=Math.sin(t/6)*50;
   drawStick(130,110,swim,-swim,25,-25);
 }
 else{
   label("Floating");
   drawStick(130,150,10,-10,0,0,Math.PI/2);
 }
}

const questions=[
{draw:actionMakeBabyLaugh,options:["The stick figure is in dance class","The stick figure is trying to make a baby laugh","The stick figure is kidnapped and is trying to signal for help."],answer:1},
{draw:actionSignal,options:["The stick figure is trying to signal to someone","The stick figure was taking a round in the house but was surprised by something unusual.","The stick figure is just having fun."],answer:0},
{draw:actionCaffeineRush,options:["The stick figure is trying to make a baby laugh","The stick figure got a caffeine rush","The stick figure is trying to teach someone how to dance."],answer:1},
{draw:actionCoach,options:["The stick figure is coaching a student","The stick figure has won a tournament","The stick figure is doing a silly dance"],answer:0}
];

function animate(){
 ctx.clearRect(0,0,260,270);
 questions[questionIndex].draw();
 frame++;
 requestAnimationFrame(animate);
}
animate();

function loadQuestion(){
 result.innerHTML="";
 options.innerHTML="";
 questions[questionIndex].options.forEach((opt,i)=>{
   let btn=document.createElement("button");
   btn.innerText=opt;
   btn.onclick=()=>checkAnswer(i);
   options.appendChild(btn);
 });
}

function checkAnswer(choice){
 if(choice===questions[questionIndex].answer){
   questionIndex++;
   if(questionIndex>=questions.length){
     options.innerHTML='<button onclick="location.reload()">Play Again</button>';
     result.innerHTML="Game Over 🎉";
   } else loadQuestion();
 } else result.innerHTML="Try again!";
}

loadQuestion();
</script>
</body>
</html>
